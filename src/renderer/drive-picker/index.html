<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose a Google Drive folder</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #f1f3f4;
        color: #202124;
      }
      .panel {
        text-align: center;
        padding: 32px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #dadce0;
        border-top-color: #1a73e8;
        border-radius: 50%;
        margin: 0 auto 16px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error {
        color: #b3261e;
        max-width: 420px;
        line-height: 1.5;
        margin: 0 auto;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="spinner" id="spinner"></div>
      <p id="status">Opening Google Drive picker...</p>
      <p id="error" class="error hidden"></p>
    </div>
    <script type="module" src="./picker.ts"></script>
  </body>
</html>
